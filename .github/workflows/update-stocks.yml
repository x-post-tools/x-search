name: Update Stock List

on:
  schedule:
    - cron: '0 1 * * 1'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests openpyxl xlrd

      - name: Download and convert stock list
        run: python update_stocks.py

      - name: Commit and push if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add stocks.json
          git diff --staged --quiet || git commit -m "chore: Update stock list $(date +%Y-%m-%d)"
          git push
